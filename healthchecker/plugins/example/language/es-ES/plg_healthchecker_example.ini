PLG_HEALTHCHECKER_EXAMPLE_CHECK_EXAMPLE_CUSTOM_CONFIG_GOOD="<p><strong>[COMPROBACIÓN DE EJEMPLO]</strong> <code>%s</code> extensiones instaladas.</p><p>Esta es una <em>demostración</em> del plugin Example Provider que muestra compatibilidad con formato HTML:</p><ul><li>Texto en <strong>negrita</strong> y <em>cursiva</em></li><li>Formato de <code>código</code> en línea</li><li>Listas para varios elementos</li></ul><p>Bloques de código con <code>&lt;pre&gt;</code>:</p><pre>php bin/console cache:clear</pre><p>Para ocultar esto, deshabilite el plugin <strong>Health Checker - Example Provider</strong>.</p>"
PLG_HEALTHCHECKER_EXAMPLE_CHECK_EXAMPLE_CUSTOM_CONFIG_WARNING="<p><strong>[COMPROBACIÓN DE EJEMPLO]</strong> Tiene <code>%s</code> extensiones instaladas.</p><p>Esta es una <em>advertencia de demostración</em> del plugin Example Provider que muestra formato HTML:</p><ul><li>Texto en negrita con <code>&lt;strong&gt;</code></li><li>Código en línea con <code>&lt;code&gt;</code></li><li>Listas con <code>&lt;ul&gt;</code> y <code>&lt;li&gt;</code></li></ul><p>Bloques de código con <code>&lt;pre&gt;</code>:</p><pre>php bin/console extension:list</pre><p>Para ocultar esto, deshabilite el plugin <strong>Health Checker - Example Provider</strong> en Extensiones → Plugins.</p>"

; Descripciones de comprobaciones - Servicio de terceros
PLG_HEALTHCHECKER_EXAMPLE_CHECK_EXAMPLE_THIRDPARTY_SERVICE_GOOD="[COMPROBACIÓN DE EJEMPLO] El servicio API de Joomla! es accesible y responde con normalidad. Para ocultar esto, deshabilite el plugin &quot;Health Checker - Example Provider&quot; en Extensiones → Plugins."
PLG_HEALTHCHECKER_EXAMPLE_CHECK_EXAMPLE_THIRDPARTY_SERVICE_WARNING="[COMPROBACIÓN DE EJEMPLO] El servicio API de Joomla! es accesible, pero responde lentamente. Para ocultar esto, deshabilite el plugin &quot;Health Checker - Example Provider&quot; en Extensiones → Plugins."
PLG_HEALTHCHECKER_EXAMPLE_CHECK_EXAMPLE_THIRDPARTY_SERVICE_CRITICAL="[COMPROBACIÓN DE EJEMPLO] No se puede acceder al servicio API de Joomla! Revise la conexión a Internet o la configuración del firewall. Para ocultar esto, deshabilite el plugin &quot;Health Checker - Example Provider&quot; en Extensiones → Plugins."
