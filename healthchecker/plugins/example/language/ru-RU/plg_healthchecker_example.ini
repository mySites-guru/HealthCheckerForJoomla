; Check descriptions - Custom Config
PLG_HEALTHCHECKER_EXAMPLE_CHECK_EXAMPLE_CUSTOM_CONFIG_GOOD="<p><strong>[ПРИМЕР ПРОВЕРКИ]</strong> Установлено расширений: <code>%s</code>.</p><p>Это <em>демонстрация</em> от плагина Example Provider, показывающая поддержку HTML-форматирования:</p><ul><li><strong>Жирный</strong> и <em>курсивный</em> текст</li><li>Внутристрочное форматирование <code>кода</code></li><li>Списки для нескольких элементов</li></ul><p>Блоки кода с <code>&lt;pre&gt;</code>:</p><pre>php bin/console cache:clear</pre><p>Чтобы скрыть это, отключите плагин <strong>Здоровье сайта - Пример проверки</strong>.</p>"
PLG_HEALTHCHECKER_EXAMPLE_CHECK_EXAMPLE_CUSTOM_CONFIG_WARNING="<p><strong>[ПРИМЕР ПРОВЕРКИ]</strong> У вас установлено расширений: <code>%s</code>.</p><p>Это <em>демонстрационное предупреждение</em> от плагина Example Provider, показывающее HTML-форматирование:</p><ul><li>Жирный текст с помощью <code>&lt;strong&gt;</code></li><li>Внутристрочный код с помощью <code>&lt;code&gt;</code></li><li>Списки с <code>&lt;ul&gt;</code> и <code>&lt;li&gt;</code></li></ul><p>Блоки кода с <code>&lt;pre&gt;</code>:</p><pre>php bin/console extension:list</pre><p>Чтобы скрыть это, отключите плагин <strong>Здоровье сайта - Пример проверки</strong> в разделе Расширения → Плагины.</p>"

; Check descriptions - Third-Party Service
PLG_HEALTHCHECKER_EXAMPLE_CHECK_EXAMPLE_THIRDPARTY_SERVICE_GOOD="[ПРИМЕР ПРОВЕРКИ] Сервис Joomla API доступен и отвечает нормально. Чтобы скрыть это, отключите плагин «Здоровье сайта - Пример проверки» в разделе Расширения → Плагины."
PLG_HEALTHCHECKER_EXAMPLE_CHECK_EXAMPLE_THIRDPARTY_SERVICE_WARNING="[ПРИМЕР ПРОВЕРКИ] Сервис Joomla API доступен, но отвечает медленно. Чтобы скрыть это, отключите плагин «Здоровье сайта - Пример проверки» в разделе Расширения → Плагины."
PLG_HEALTHCHECKER_EXAMPLE_CHECK_EXAMPLE_THIRDPARTY_SERVICE_CRITICAL="[ПРИМЕР ПРОВЕРКИ] Не удалось связаться с сервисом Joomla API. Проверьте подключение к интернету или настройки брандмауэра. Чтобы скрыть это, отключите плагин «Здоровье сайта - Пример проверки» в разделе Расширения → Плагины."
